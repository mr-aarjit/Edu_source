services:
  - type: web
    name: App
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn Project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edu_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true